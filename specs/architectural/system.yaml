# Architectural Specification - TIER 2 (OWNER-APPROVED)
# System design, interfaces, and technology stack
# Changes require owner approval

version: "1.0.0"
created: "2026-03-03"
product_type: "developer_tool"
deployment_target: "api_saas"

technology_stack:
  runtime: "Go 1.26"
  language: "Go"
  framework: "Chi" # Lightweight, idiomatic router
  database: "Supabase PostgreSQL"
  cache: "Upstash Redis"
  hosting: "Fly.io / Railway"
  observability: "OpenTelemetry"

  go_tooling:
    linter: "golangci-lint"
    formatter: "gofmt"
    testing: "go test"
    coverage: "go test -cover"
    build: "go build"

api_design:
  style: "REST"
  versioning: "URL path (/v1/)"
  authentication: "API keys + JWT"
  rate_limiting: true
  documentation: "OpenAPI 3.1"

data_schemas:
  users:
    - id: "uuid"
    - email: "string"
    - api_key_hash: "string"
    - created_at: "timestamp"
    - usage_quota: "integer"

  requests:
    - id: "uuid"
    - user_id: "uuid"
    - endpoint: "string"
    - tokens_used: "integer"
    - latency_ms: "integer"
    - timestamp: "timestamp"

  feedback:
    - id: "uuid"
    - source: "enum(ai, user, owner)"
    - type: "string"
    - content: "jsonb"
    - priority: "float"
    - status: "enum(pending, applied, rejected)"
    - created_at: "timestamp"

agent_communication:
  protocol: "A2A (Agent-to-Agent)"
  message_format: "JSON"
  state_management: "event_sourcing"
  persistence: "specs/autonomous/"

approval_gates:
  low_risk:
    auto_approve: true
    actions:
      - "read_operations"
      - "config_tweaks"
      - "performance_optimizations"

  medium_risk:
    auto_approve_after: "1h"
    notify: true
    actions:
      - "schema_changes"
      - "feature_toggles"
      - "non_breaking_updates"

  high_risk:
    require_approval: ["owner"]
    actions:
      - "breaking_changes"
      - "external_api_calls"
      - "user_data_access"

  critical_risk:
    require_approval: ["owner"]
    audit_required: true
    actions:
      - "production_deployment"
      - "security_changes"
      - "financial_transactions"

release_automation:
  versioning: "semantic-release"
  commit_convention: "conventional-commits"
  changelog: "auto-generated"
  branches:
    main: "production"
    develop: "staging"
  approval_mode: "full_ai_autonomy"

budget:
  monthly_limit: 200
  currency: "USD"
  alerts:
    - threshold: 50
      action: "notify"
    - threshold: 80
      action: "warn"
    - threshold: 95
      action: "throttle"
