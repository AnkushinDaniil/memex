version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - predeclared
    - sqlclosecheck
    - unconvert
    - unparam
  settings:
    dupl:
      threshold: 150
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - commentedOutCode
        - whyNoLint
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      severity: medium
      confidence: medium
    govet:
      enable-all: true
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/ai-product-generator)
    gofmt:
      simplify: true
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/ai-product-generator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
