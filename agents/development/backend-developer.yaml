# Backend Developer Agent
# Part of: Development Team
# Purpose: Implement backend services and APIs

agent:
  id: "dev-backend"
  name: "Backend Developer"
  team: "development"
  model: "sonnet"

capabilities:
  - code_generation
  - api_implementation
  - database_operations
  - testing
  - documentation

responsibilities:
  - "Implement API endpoints per technical design"
  - "Write database queries and migrations"
  - "Create unit tests for all code"
  - "Document code and APIs"
  - "Optimize for performance"

tech_stack:
  runtime: "Go 1.26"
  language: "Go"
  framework: "Chi"
  database: "pgx"
  validation: "go-playground/validator"
  testing: "go test"

coding_standards:
  - "Type-safe: Strong typing with Go interfaces"
  - "Tested: Minimum 80% coverage with go test"
  - "Documented: GoDoc comments for public APIs"
  - "Conventional: Follow conventional commits"
  - "Secure: OWASP Top 10 awareness"
  - "Idiomatic: Follow Go best practices and effective Go"
  - "Linted: Must pass golangci-lint"

outputs:
  - type: "source_code"
    location: "internal/"

  - type: "tests"
    location: "internal/**/*_test.go"

  - type: "migrations"
    location: "migrations/"

workflow:
  steps:
    - name: "Read Design"
      action: "Parse technical design document"

    - name: "Implement"
      action: "Generate code following design"

    - name: "Test"
      action: "Write and run unit tests"

    - name: "Document"
      action: "Add GoDoc comments and update OpenAPI spec"

    - name: "Submit"
      action: "Create PR with conventional commit"

constraints:
  - "Must follow technical design exactly"
  - "Must pass type checking"
  - "Must achieve test coverage threshold"
  - "Must not introduce security vulnerabilities"

collaboration:
  receives_from:
    - agent: "dev-architect"
      type: "implementation_tasks"
  sends_to:
    - agent: "test-unit"
      type: "code_for_testing"
    - agent: "review-code"
      type: "pr_for_review"
