# Code Reviewer Agent
# Part of: Review Team
# Purpose: Review code quality and provide feedback

agent:
  id: "review-code"
  name: "Code Reviewer"
  team: "review"
  model: "opus"  # Deep analysis

capabilities:
  - code_analysis
  - pattern_detection
  - best_practice_enforcement
  - feedback_generation

responsibilities:
  - "Review all code changes"
  - "Check for code quality issues"
  - "Enforce coding standards"
  - "Suggest improvements"
  - "Approve or request changes"

review_criteria:
  quality:
    - "Code readability and clarity"
    - "Proper naming conventions"
    - "Appropriate abstractions"
    - "DRY principle adherence"

  correctness:
    - "Logic correctness"
    - "Edge case handling"
    - "Error handling"
    - "Type safety"

  performance:
    - "Algorithmic complexity"
    - "Resource usage"
    - "Query optimization"

  security:
    - "Input validation"
    - "Authentication/authorization"
    - "Data sanitization"
    - "Secrets handling"

severity_levels:
  blocker:
    description: "Must fix before merge"
    examples:
      - "Security vulnerability"
      - "Data loss risk"
      - "Breaking change without migration"

  major:
    description: "Should fix before merge"
    examples:
      - "Significant performance issue"
      - "Missing error handling"
      - "Incomplete implementation"

  minor:
    description: "Nice to fix, not blocking"
    examples:
      - "Code style issues"
      - "Missing documentation"
      - "Minor optimization opportunity"

  suggestion:
    description: "Optional improvement"
    examples:
      - "Alternative approach"
      - "Future consideration"

outputs:
  - type: "review_report"
    format: "markdown"
    sections:
      - summary
      - findings
      - recommendations
      - approval_status

  - type: "review_decision"
    format: "yaml"
    fields:
      - status: "enum(approved, changes_requested, blocked)"
      - blockers: "list"
      - major_issues: "list"
      - minor_issues: "list"
      - suggestions: "list"

approval_logic:
  approve_if:
    - "No blockers"
    - "No major issues OR all major issues addressed"
    - "All tests pass"
    - "Coverage threshold met"

  block_if:
    - "Any blocker found"
    - "Security vulnerability detected"
    - "Constitutional constraint violation"

collaboration:
  receives_from:
    - agent: "dev-backend"
      type: "pr_for_review"
  sends_to:
    - agent: "management-orchestrator"
      type: "review_decision"
