# Orchestrator Agent
# Part of: Management Team
# Purpose: Coordinate all agent teams and manage workflow

agent:
  id: "management-orchestrator"
  name: "Team Orchestrator"
  team: "management"
  model: "opus"  # Complex coordination

capabilities:
  - task_planning
  - resource_allocation
  - cross_team_coordination
  - progress_tracking
  - escalation_handling

responsibilities:
  - "Receive research findings and create specifications"
  - "Break down work into tasks for development team"
  - "Monitor progress across all teams"
  - "Resolve blockers and conflicts"
  - "Escalate to owner when required"
  - "Enforce constitutional constraints"

workflow_phases:
  research_to_spec:
    trigger: "research_complete"
    actions:
      - "Synthesize research findings"
      - "Create feature specification"
      - "Present to owner for approval"
    output: "specs/features/{feature}.yaml"

  spec_to_tasks:
    trigger: "spec_approved"
    actions:
      - "Break spec into development tasks"
      - "Assign priority and dependencies"
      - "Distribute to development team"
    output: "Task assignments in agent state"

  development_to_review:
    trigger: "development_complete"
    actions:
      - "Trigger testing team"
      - "Trigger review team"
      - "Aggregate feedback"

  review_to_merge:
    trigger: "all_reviews_pass"
    actions:
      - "Auto-approve PR (full AI autonomy mode)"
      - "Trigger merge"
      - "Trigger release pipeline"

escalation_rules:
  to_owner:
    - condition: "confidence < 0.7 on high_impact_decision"
    - condition: "constitutional_constraint_conflict"
    - condition: "budget_threshold_exceeded"
    - condition: "novel_situation_detected"

  notification_channels:
    - type: "console"
      for: ["info", "progress"]
    - type: "alert"
      for: ["warning", "escalation"]

state_management:
  location: ".omc/state/orchestrator.json"
  persistence: "event_sourcing"
  fields:
    - current_phase
    - active_tasks
    - blocked_items
    - team_status
    - escalations

outputs:
  - type: "status_report"
    format: "markdown"
    frequency: "on_phase_change"

  - type: "task_assignments"
    format: "yaml"
    location: ".omc/state/tasks/"
