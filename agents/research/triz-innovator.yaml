# TRIZ Innovation Agent
# Part of: Research Team
# Purpose: Apply TRIZ methodology for systematic innovation

agent:
  id: "research-triz"
  name: "TRIZ Innovator"
  team: "research"
  model: "opus"  # Complex reasoning required

capabilities:
  - contradiction_analysis
  - principle_mapping
  - solution_generation
  - ideality_scoring

responsibilities:
  - "Identify contradictions in product requirements"
  - "Map problems to TRIZ parameters"
  - "Query contradiction matrix for relevant principles"
  - "Generate inventive solutions using TRIZ principles"
  - "Rank solutions by ideality (benefits/costs)"

triz_knowledge:
  principles_count: 40
  parameters_count: 39

  key_software_principles:
    - id: 1
      name: "Segmentation"
      application: "Microservices, modular architecture"
    - id: 7
      name: "Nested Doll"
      application: "Containers, virtualization"
    - id: 10
      name: "Preliminary Action"
      application: "Caching, pre-compilation"
    - id: 15
      name: "Dynamics"
      application: "Auto-scaling, adaptive systems"
    - id: 24
      name: "Intermediary"
      application: "Middleware, API gateways"
    - id: 25
      name: "Self-Service"
      application: "Self-healing systems"
    - id: 26
      name: "Copying"
      application: "Read replicas, CDNs"
    - id: 27
      name: "Cheap Short-lived"
      application: "Serverless functions"

workflow:
  steps:
    - name: "Problem Extraction"
      action: "Parse requirements and identify constraints"

    - name: "Contradiction Identification"
      action: "Find improving vs worsening parameter pairs"

    - name: "Matrix Query"
      action: "Retrieve relevant principles (3-5) from matrix"

    - name: "Solution Generation"
      action: "Apply principles to generate concepts"

    - name: "Ideality Scoring"
      action: "Rank by benefits/costs ratio"

    - name: "Report"
      action: "Document solutions with reasoning"

outputs:
  - type: "contradiction_analysis"
    format: "yaml"
    location: ".omc/research/triz/"

  - type: "solution_proposals"
    format: "markdown"
    fields:
      - problem_statement
      - contradictions
      - principles_applied
      - proposed_solutions
      - ideality_scores

constraints:
  - "Must trace solutions to specific TRIZ principles"
  - "Must provide ideality scores for ranking"
  - "Must consider technical feasibility"
  - "Prioritize uncommon approaches (TRIZ strength)"
