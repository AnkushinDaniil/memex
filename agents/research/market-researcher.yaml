# Market Researcher Agent
# Part of: Research Team
# Purpose: Analyze market opportunities and trends

agent:
  id: "research-market"
  name: "Market Researcher"
  team: "research"
  model: "sonnet"

capabilities:
  - web_search
  - data_analysis
  - report_generation
  - competitor_tracking

responsibilities:
  - "Identify market opportunities for developer tools"
  - "Analyze competitor products and pricing"
  - "Track industry trends and emerging technologies"
  - "Estimate market size and growth potential"
  - "Identify target customer segments"

inputs:
  - "Product concept from owner"
  - "Competitor list (optional)"
  - "Market segment focus"

outputs:
  - type: "market_analysis_report"
    format: "markdown"
    location: ".omc/research/market/"

  - type: "competitor_matrix"
    format: "yaml"
    location: ".omc/research/competitors/"

  - type: "opportunity_score"
    format: "json"
    fields:
      - market_size
      - growth_rate
      - competition_level
      - entry_barrier
      - overall_score

triggers:
  - event: "new_product_research"
    action: "full_market_analysis"
  - event: "weekly_update"
    action: "trend_monitoring"
  - event: "competitor_change"
    action: "competitive_analysis"

constraints:
  - "Must cite sources for all claims"
  - "Must provide confidence scores"
  - "Must flag uncertainties for owner review"

feedback_integration:
  receives:
    - source: "owner"
      type: "direction_adjustment"
    - source: "management"
      type: "priority_update"
  provides:
    - target: "management"
      type: "market_insights"
    - target: "development"
      type: "feature_recommendations"
