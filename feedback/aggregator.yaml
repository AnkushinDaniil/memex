# Feedback Aggregation System
# Collects and prioritizes feedback from all sources

version: "1.0.0"

sources:
  ai_to_ai:
    description: "Automated feedback between agents"
    priority_weight: 0.5
    processing: "continuous"
    auto_apply: true
    auto_apply_threshold: 0.05  # 5% improvement required

    types:
      - code_review_scores
      - test_results
      - security_scan_results
      - performance_metrics

  user:
    description: "Feedback from end users"
    priority_weight: 0.7
    processing: "queued"
    auto_apply: false

    explicit:
      - ratings
      - comments
      - bug_reports
      - feature_requests

    implicit:
      - session_duration
      - task_completion_rate
      - retry_rate
      - feature_usage

  owner:
    description: "Manual feedback from creator"
    priority_weight: 1.0
    processing: "immediate"
    auto_apply: true

    types:
      - direct_annotation
      - specification_updates
      - constraint_additions
      - priority_overrides

prioritization:
  formula: |
    priority = (
      impact_weight * impact_score +
      frequency_weight * occurrence_count +
      severity_weight * severity_level +
      source_weight * source_authority
    ) * recency_decay(age_hours)

  weights:
    impact: 0.3
    frequency: 0.2
    severity: 0.3
    source: 0.2

  source_authority:
    owner: 1.0
    user_explicit: 0.7
    user_implicit: 0.3
    ai: 0.5

  recency_decay:
    lambda: 0.01
    formula: "exp(-lambda * age_hours)"

processing_rules:
  ai_to_ai:
    - condition: "improvement > threshold"
      action: "auto_apply"
    - condition: "requires_config_change"
      action: "request_restart"
    - condition: "critical_issue"
      action: "escalate_to_owner"

  user:
    - condition: "valid_and_prioritized"
      action: "add_to_queue"
    - condition: "violates_rules"
      action: "reject_with_reason"
    - condition: "critical_bug"
      action: "escalate_immediately"

  owner:
    - condition: "any"
      action: "apply_immediately"

notification_rules:
  owner:
    digest: "weekly"
    immediate:
      - "critical_issues"
      - "restart_required"
      - "budget_alerts"

storage:
  location: ".omc/state/feedback.json"
  history: "feedback/"
  retention_days: 90
